    <g><rect x="245" y="150" width="155" height="96" rx="14" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/><text x="322" y="195" text-anchor="middle" fill="#1f2430">② 확인</text><text x="322" y="220" text-anchor="middle" font-size="13" font-weight="400" fill="#6b7280">위치·증상·긴급도</text></g>
    <g><rect x="435" y="150" width="155" height="96" rx="14" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/><text x="512" y="195" text-anchor="middle" fill="#1f2430">③ 준비·이동</text><text x="512" y="220" text-anchor="middle" font-size="13" font-weight="400" fill="#6b7280">공구·부품</text></g>
    <g><rect x="625" y="150" width="155" height="96" rx="14" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/><text x="702" y="195" text-anchor="middle" fill="#0f766e">④ 진단</text><text x="702" y="220" text-anchor="middle" font-size="13" font-weight="400" fill="#5d7c78">1차 점검·원인</text></g>
    <g><rect x="815" y="150" width="155" height="96" rx="14" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/><text x="892" y="195" text-anchor="middle" fill="#0f766e">⑤ 조치</text><text x="892" y="220" text-anchor="middle" font-size="13" font-weight="400" fill="#5d7c78">수리·교체</text></g>
    <g><rect x="1005" y="150" width="140" height="96" rx="14" fill="#1f2430" stroke="#1f2430" stroke-width="2.5"/><text x="1075" y="195" text-anchor="middle" fill="#ffffff">⑥ 기록</text><text x="1075" y="220" text-anchor="middle" font-size="13" font-weight="400" fill="#cbb9ab">결과·이력</text></g>
