<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fbfd"/>
  <text x="70" y="70" font-size="34" font-family="Segoe UI, Arial" font-weight="700" fill="#16323a">기계실을 시스템으로 보는 관점</text>
  <rect x="120" y="170" width="160" height="220" rx="18" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="200" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#1d4ed8">열원 유입</text>
  <rect x="340" y="170" width="210" height="220" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="445" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#0f766e">열교환기</text>
  <rect x="610" y="170" width="180" height="220" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="700" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#047857">펌프</text>
  <rect x="850" y="170" width="220" height="220" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="960" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#c2410c">밸브와 센서</text>
  <path d="M280 280H340" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M550 280H610" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 280H850" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="120" y="480" font-size="22" font-family="Segoe UI, Arial" fill="#42596a">설계 문서는 부품 목록보다 연결 구조를 먼저 보게 만든다.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
