<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
  </defs>
  <rect width="1200" height="400" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">PreDist 읽는 4단계</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">큰 그림에서 세부로 — 위에서 아래로 질문을 좁혀간다</text>

  <g font-weight="700">
    <g>
      <rect x="60" y="160" width="250" height="150" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
      <circle cx="100" cy="200" r="20" fill="#ea580c"/><text x="100" y="207" text-anchor="middle" font-size="20" fill="#fff">1</text>
      <text x="135" y="207" font-size="20" fill="#c2410c">어느 기계실?</text>
      <text x="85" y="252" font-size="14" font-weight="400" fill="#9a6a4f">데이터는 기계실</text>
      <text x="85" y="274" font-size="14" font-weight="400" fill="#9a6a4f">단위로 나뉜다</text>
    </g>
    <g>
      <rect x="350" y="160" width="250" height="150" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
      <circle cx="390" cy="200" r="20" fill="#ea580c"/><text x="390" y="207" text-anchor="middle" font-size="20" fill="#fff">2</text>
      <text x="425" y="207" font-size="20" fill="#c2410c">어떤 센서?</text>
      <text x="375" y="252" font-size="14" font-weight="400" fill="#9a6a4f">각 컬럼이 무엇을</text>
      <text x="375" y="274" font-size="14" font-weight="400" fill="#9a6a4f">재는지 본다</text>
    </g>
    <g>
      <rect x="640" y="160" width="250" height="150" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
      <circle cx="680" cy="200" r="20" fill="#ea580c"/><text x="680" y="207" text-anchor="middle" font-size="20" fill="#fff">3</text>
      <text x="715" y="207" font-size="20" fill="#c2410c">무슨 사건?</text>
      <text x="665" y="252" font-size="14" font-weight="400" fill="#9a6a4f">이상·정비·민원</text>
      <text x="665" y="274" font-size="14" font-weight="400" fill="#9a6a4f">라벨을 확인</text>
    </g>
    <g>
      <rect x="930" y="160" width="210" height="150" rx="16" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/>
      <circle cx="970" cy="200" r="20" fill="#0f766e"/><text x="970" y="207" text-anchor="middle" font-size="20" fill="#fff">4</text>
      <text x="1005" y="207" font-size="20" fill="#0f766e">무슨 뜻?</text>
      <text x="955" y="252" font-size="14" font-weight="400" fill="#5d7c78">부품·운영 문제로</text>
      <text x="955" y="274" font-size="14" font-weight="400" fill="#5d7c78">번역한다</text>
    </g>
  </g>

  <path d="M310 235 H350" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M600 235 H640" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M890 235 H930" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
</svg>
