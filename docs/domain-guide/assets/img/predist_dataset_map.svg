<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fbfd"/>
  <text x="70" y="70" font-size="34" font-family="Segoe UI, Arial" font-weight="700" fill="#16323a">PreDist 데이터셋 읽는 순서</text>
  <rect x="70" y="130" width="280" height="160" rx="20" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="210" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#1d4ed8">파일 구조</text>
  <text x="210" y="218" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#405270">기계실 단위</text>
  <text x="210" y="246" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#405270">시계열 단위</text>
  <rect x="460" y="130" width="280" height="160" rx="20" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="600" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#047857">컬럼 해석</text>
  <text x="600" y="218" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#3d5a53">센서값</text>
  <text x="600" y="246" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#3d5a53">운영 이벤트</text>
  <rect x="850" y="130" width="280" height="160" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="990" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#c2410c">운영 해석</text>
  <text x="990" y="218" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#704a3d">부품 상태</text>
  <text x="990" y="246" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#704a3d">작업지시 후보</text>
  <path d="M350 210H460" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M740 210H850" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="140" y="370" width="920" height="170" rx="24" fill="#ffffff" stroke="#d7e2ea" stroke-width="2"/>
  <text x="180" y="420" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#16323a">초심자 체크 포인트</text>
  <text x="180" y="460" font-size="20" font-family="Segoe UI, Arial" fill="#42596a">1. 이 숫자가 무엇을 재는가</text>
  <text x="180" y="492" font-size="20" font-family="Segoe UI, Arial" fill="#42596a">2. 이 변화가 어떤 부품과 연결되는가</text>
  <text x="180" y="524" font-size="20" font-family="Segoe UI, Arial" fill="#42596a">3. 운영자는 이 패턴을 보고 어떤 행동을 해야 하는가</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
