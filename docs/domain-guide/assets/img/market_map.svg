<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="420" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">HeatGrid 이해관계자 지도</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">돈 내는 사람, 실제 쓰는 사람, 분위기에 영향 주는 사람이 다르다</text>

  <g>
    <rect x="70" y="160" width="340" height="210" rx="18" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
    <text x="240" y="205" text-anchor="middle" font-size="22" font-weight="800" fill="#c2410c">구매자</text>
    <text x="240" y="240" text-anchor="middle" font-size="15" fill="#9a6a4f">사업자 본사·운영본부·FM 본부</text>
    <line x1="110" y1="262" x2="370" y2="262" stroke="#f0cdb4" stroke-width="1.5"/>
    <text x="240" y="292" text-anchor="middle" font-size="14" fill="#7a4a30">예산·도입 결정</text>
    <text x="240" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">"운영 리스크를 줄였나?"</text>
  </g>
  <g>
    <rect x="430" y="160" width="340" height="210" rx="18" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/>
    <text x="600" y="205" text-anchor="middle" font-size="22" font-weight="800" fill="#0f766e">사용자</text>
    <text x="600" y="240" text-anchor="middle" font-size="15" fill="#5d7c78">관제 담당자·운영자·정비사</text>
    <line x1="470" y1="262" x2="730" y2="262" stroke="#c5e6e1" stroke-width="1.5"/>
    <text x="600" y="292" text-anchor="middle" font-size="14" fill="#456">실제 매일 사용</text>
    <text x="600" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">"지금 뭘 먼저 할까?"</text>
  </g>
  <g>
    <rect x="790" y="160" width="340" height="210" rx="18" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/>
    <text x="960" y="205" text-anchor="middle" font-size="22" font-weight="800" fill="#1f2430">영향자</text>
    <text x="960" y="240" text-anchor="middle" font-size="15" fill="#6b7280">관리사무소·입주자·정책 담당</text>
    <line x1="830" y1="262" x2="1090" y2="262" stroke="#ece4da" stroke-width="1.5"/>
    <text x="960" y="292" text-anchor="middle" font-size="14" fill="#6b7280">도입 분위기에 영향</text>
    <text x="960" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2430">"민원이 줄었나?"</text>
  </g>
</svg>
