<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
  </defs>
  <rect width="1200" height="430" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">국내 지역난방 — 열은 이렇게 흐른다</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">사업자에서 데운 물이 배관을 타고 기계실까지, 거기서 각 집 난방·온수로</text>

  <g>
    <rect x="60" y="155" width="200" height="120" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
    <text x="160" y="205" text-anchor="middle" font-size="21" font-weight="700" fill="#c2410c">집단에너지</text>
    <text x="160" y="232" text-anchor="middle" font-size="21" font-weight="700" fill="#c2410c">사업자</text>
    <text x="160" y="258" text-anchor="middle" font-size="14" fill="#9a6a4f">열을 생산·공급</text>
  </g>
  <g>
    <rect x="340" y="155" width="200" height="120" rx="16" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/>
    <text x="440" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2430">열수송망</text>
    <text x="440" y="240" text-anchor="middle" font-size="14" fill="#6b7280">온수 고속도로(배관)</text>
  </g>
  <g>
    <rect x="620" y="155" width="200" height="120" rx="16" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/>
    <text x="720" y="205" text-anchor="middle" font-size="21" font-weight="700" fill="#0f766e">사용자 기계실</text>
    <text x="720" y="234" text-anchor="middle" font-size="14" fill="#5d7c78">열을 난방·온수로 변환</text>
    <text x="720" y="256" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="700">← HeatGrid 관찰 지점</text>
  </g>
  <g>
    <rect x="900" y="155" width="200" height="120" rx="16" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/>
    <text x="1000" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2430">건물 난방·온수</text>
    <text x="1000" y="240" text-anchor="middle" font-size="14" fill="#6b7280">실제 사용 구간</text>
  </g>

  <path d="M260 215 H340" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M540 215 H620" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M820 215 H900" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="620" y="320" width="480" height="58" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="346" font-size="16" font-weight="700" fill="#b91c1c">⚠ 민원·체감 불편은 대부분 여기서</text>
  <text x="650" y="368" font-size="14" fill="#8a4a4a">기계실 이후 사용자 구간에서 드러난다</text>
  <path d="M820 300 L760 320" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 4"/>
</svg>
