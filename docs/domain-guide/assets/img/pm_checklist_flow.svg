<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
  </defs>
  <rect width="1200" height="420" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">좋은 체크리스트는 결과까지 남긴다</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">"확인 ☑" 한 칸이 아니라, 무엇을 했고 어땠는지까지</text>

  <!-- bad vs good -->
  <g>
    <rect x="70" y="160" width="460" height="210" rx="18" fill="#ffffff" stroke="#dcd2c4" stroke-width="2"/>
    <text x="100" y="200" font-size="18" font-weight="800" fill="#9aa0aa">✗ 약한 체크리스트</text>
    <text x="100" y="244" font-size="17" fill="#6b7280">☑ 필터 확인</text>
    <text x="100" y="280" font-size="17" fill="#6b7280">☑ 펌프 확인</text>
    <text x="100" y="316" font-size="17" fill="#6b7280">☑ 밸브 확인</text>
    <text x="100" y="352" font-size="14" fill="#b0b0b0">→ 다음 사람이 비교할 정보가 없다</text>
  </g>
  <g>
    <rect x="670" y="160" width="460" height="210" rx="18" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
    <text x="700" y="200" font-size="18" font-weight="800" fill="#c2410c">✓ 좋은 체크리스트</text>
    <text x="700" y="244" font-size="16" fill="#7a4a30">필터 — 오염 60%, 세척함</text>
    <text x="700" y="280" font-size="16" fill="#7a4a30">교체 필요: 다음 점검 시</text>
    <text x="700" y="316" font-size="16" fill="#7a4a30">다음 점검: 3개월 후</text>
    <text x="700" y="352" font-size="14" fill="#c2410c" font-weight="700">→ 비교가 가능해 예측이 생긴다</text>
  </g>
  <path d="M530 265 H670" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
</svg>
