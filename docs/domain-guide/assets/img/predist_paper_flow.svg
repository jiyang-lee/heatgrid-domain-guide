<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
  </defs>
  <rect width="1200" height="430" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">PreDist 논문이 말하는 핵심 흐름</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">"기계 이상"과 "사람 불편"을 한 시간축에 올려 lead time을 본다</text>

  <g>
    <rect x="60" y="155" width="210" height="120" rx="16" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/>
    <text x="165" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#0f766e">운영 시계열</text>
    <text x="165" y="234" text-anchor="middle" font-size="14" fill="#5d7c78">온도·압력·유량·밸브</text>
  </g>
  <g>
    <rect x="330" y="155" width="210" height="120" rx="16" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/>
    <text x="435" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#0f766e">이벤트 라벨</text>
    <text x="435" y="234" text-anchor="middle" font-size="14" fill="#5d7c78">disturbance·maintenance</text>
  </g>
  <g>
    <rect x="600" y="155" width="210" height="120" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/>
    <text x="705" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#c2410c">고객 체감</text>
    <text x="705" y="234" text-anchor="middle" font-size="14" fill="#9a6a4f">customer report</text>
  </g>
  <g>
    <rect x="870" y="155" width="270" height="120" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="2.5"/>
    <text x="1005" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">lead time</text>
    <text x="1005" y="234" text-anchor="middle" font-size="14" fill="#8a4a4a">민원 전 조기 감지의 여유</text>
  </g>

  <path d="M270 215 H330" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M540 215 H600" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M810 215 H870" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="120" y="330" width="960" height="68" rx="16" fill="#ffffff" stroke="#ece4da" stroke-width="2"/>
  <text x="150" y="362" font-size="18" font-weight="800" fill="#1f2430">HeatGrid로 번역하면</text>
  <text x="150" y="386" font-size="15" fill="#5d6b7a">센서 패턴을 읽고, 이벤트 의미를 해석하고, 고객이 체감하기 전에 무엇을 먼저 볼지 정하는 운영 Agent의 학습 재료</text>
</svg>
