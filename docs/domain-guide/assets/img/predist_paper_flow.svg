<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f7fbfc"/>
  <text x="70" y="70" font-size="34" font-family="Segoe UI, Arial" font-weight="700" fill="#12343b">PreDist 논문이 말하는 핵심 흐름</text>
  <rect x="70" y="130" width="220" height="120" rx="18" fill="#e8f5f3" stroke="#0f766e" stroke-width="3"/>
  <text x="180" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#0f766e">운영 시계열</text>
  <text x="180" y="214" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#35545c">온도, 압력, 유량, 밸브</text>
  <rect x="360" y="130" width="220" height="120" rx="18" fill="#edf2ff" stroke="#2155d6" stroke-width="3"/>
  <text x="470" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#2155d6">이벤트 라벨</text>
  <text x="470" y="214" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#405270">disturbance / maintenance</text>
  <rect x="650" y="130" width="220" height="120" rx="18" fill="#fff5e8" stroke="#d97706" stroke-width="3"/>
  <text x="760" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#b45309">고객 체감</text>
  <text x="760" y="214" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#66483a">customer report</text>
  <rect x="940" y="130" width="190" height="120" rx="18" fill="#fceaea" stroke="#dc2626" stroke-width="3"/>
  <text x="1035" y="180" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#b91c1c">lead time</text>
  <text x="1035" y="214" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial" fill="#6a3d3d">민원 전 조기 감지</text>
  <path d="M290 190H360" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 190H650" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 190H940" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="120" y="340" width="960" height="140" rx="22" fill="#ffffff" stroke="#cfdde5" stroke-width="2"/>
  <text x="160" y="392" font-size="24" font-family="Segoe UI, Arial" font-weight="700" fill="#12343b">HeatGrid로 번역하면</text>
  <text x="160" y="432" font-size="20" font-family="Segoe UI, Arial" fill="#274850">센서 패턴을 읽고, 이벤트 의미를 해석하고, 고객이 체감하기 전에 무엇을 먼저 볼지 정하는 운영 Agent의 학습 재료</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4b5563"/>
    </marker>
  </defs>
</svg>
