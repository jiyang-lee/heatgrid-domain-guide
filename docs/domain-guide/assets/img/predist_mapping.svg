<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
  </defs>
  <rect width="1200" height="440" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">PreDist 컬럼에서 작업지시까지</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">데이터 사건을 현장 의미로, 다시 Agent 출력으로 번역한다</text>

  <!-- column headers -->
  <text x="230" y="150" text-anchor="middle" font-size="16" font-weight="800" fill="#0f766e">PreDist 정보</text>
  <text x="600" y="150" text-anchor="middle" font-size="16" font-weight="800" fill="#6b7280">현장 해석</text>
  <text x="970" y="150" text-anchor="middle" font-size="16" font-weight="800" fill="#c2410c">Agent 출력</text>

  <g font-size="17">
    <!-- row 1 -->
    <rect x="80" y="170" width="300" height="66" rx="12" fill="#e7f5f3" stroke="#0f766e" stroke-width="2"/>
    <text x="230" y="210" text-anchor="middle" font-weight="700" fill="#0f766e">disturbance 이벤트</text>
    <rect x="450" y="170" width="300" height="66" rx="12" fill="#ffffff" stroke="#dcd2c4" stroke-width="2"/>
    <text x="600" y="210" text-anchor="middle" fill="#1f2430">초기 이상 징후</text>
    <rect x="820" y="170" width="300" height="66" rx="12" fill="#fff1e7" stroke="#ea580c" stroke-width="2"/>
    <text x="970" y="210" text-anchor="middle" font-weight="700" fill="#c2410c">관찰 경보</text>
    <path d="M380 203 H450" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>
    <path d="M750 203 H820" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>

    <!-- row 2 -->
    <rect x="80" y="256" width="300" height="66" rx="12" fill="#e7f5f3" stroke="#0f766e" stroke-width="2"/>
    <text x="230" y="296" text-anchor="middle" font-weight="700" fill="#0f766e">maintenance 이벤트</text>
    <rect x="450" y="256" width="300" height="66" rx="12" fill="#ffffff" stroke="#dcd2c4" stroke-width="2"/>
    <text x="600" y="296" text-anchor="middle" fill="#1f2430">실제 작업 이력</text>
    <rect x="820" y="256" width="300" height="66" rx="12" fill="#fff1e7" stroke="#ea580c" stroke-width="2"/>
    <text x="970" y="296" text-anchor="middle" font-weight="700" fill="#c2410c">이력 기반 추천</text>
    <path d="M380 289 H450" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>
    <path d="M750 289 H820" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>

    <!-- row 3 -->
    <rect x="80" y="342" width="300" height="66" rx="12" fill="#e7f5f3" stroke="#0f766e" stroke-width="2"/>
    <text x="230" y="382" text-anchor="middle" font-weight="700" fill="#0f766e">customer report</text>
    <rect x="450" y="342" width="300" height="66" rx="12" fill="#ffffff" stroke="#dcd2c4" stroke-width="2"/>
    <text x="600" y="382" text-anchor="middle" fill="#1f2430">민원·체감 문제</text>
    <rect x="820" y="342" width="300" height="66" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="2"/>
    <text x="970" y="382" text-anchor="middle" font-weight="700" fill="#b91c1c">민원 우선순위 ↑</text>
    <path d="M380 375 H450" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>
    <path d="M750 375 H820" stroke="#9aa0aa" stroke-width="2.5" marker-end="url(#ar)"/>
  </g>
</svg>
