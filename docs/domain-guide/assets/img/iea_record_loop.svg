<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Pretendard, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#9aa0aa"/></marker>
    <marker id="arh" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#ea580c"/></marker>
  </defs>
  <rect width="1200" height="420" rx="22" fill="#fff9f4"/>
  <text x="60" y="66" font-size="30" font-weight="800" fill="#1f2430">기록은 다음 판단의 입력이 된다</text>
  <text x="60" y="100" font-size="18" fill="#6b7280">점검·정비 기록이 쌓여 다음 점검과 재계획을 더 똑똑하게 만든다</text>

  <g font-weight="700" font-size="20">
    <g><rect x="80" y="160" width="250" height="110" rx="16" fill="#ffffff" stroke="#dcd2c4" stroke-width="2.5"/><text x="205" y="205" text-anchor="middle" fill="#1f2430">연결 구조</text><text x="205" y="233" text-anchor="middle" font-size="14" font-weight="400" fill="#6b7280">안정 운영의 뼈대</text></g>
    <g><rect x="410" y="160" width="250" height="110" rx="16" fill="#e7f5f3" stroke="#0f766e" stroke-width="2.5"/><text x="535" y="205" text-anchor="middle" fill="#0f766e">점검·정비</text><text x="535" y="233" text-anchor="middle" font-size="14" font-weight="400" fill="#5d7c78">실제 작업 수행</text></g>
    <g><rect x="740" y="160" width="250" height="110" rx="16" fill="#fff1e7" stroke="#ea580c" stroke-width="2.5"/><text x="865" y="205" text-anchor="middle" fill="#c2410c">로그북 기록</text><text x="865" y="233" text-anchor="middle" font-size="14" font-weight="400" fill="#9a6a4f">이력을 누적</text></g>
  </g>

  <path d="M330 215 H410" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>
  <path d="M660 215 H740" stroke="#9aa0aa" stroke-width="3" marker-end="url(#ar)"/>

  <path d="M865 270 V330 H535 V270" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arh)"/>
  <rect x="300" y="308" width="470" height="46" rx="12" fill="#fff1e7" stroke="#ea580c" stroke-width="2"/>
  <text x="535" y="337" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">재발 이력 → 우선순위·재계획에 반영</text>
</svg>
